<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>SIDCORP — ДолгУчет</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #0a1f1a 0%, #0c2a1f 100%);
            min-height: 100vh;
            color: #e4f5e9;
            padding-bottom: 70px;
        }
        .splash {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #0a1f1a, #0c2a1f);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 3000;
            flex-direction: column;
            transition: opacity 0.5s;
        }
        .splash-logo { font-size: 56px; font-weight: 900; background: linear-gradient(135deg, #2ecc71, #27ae60); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .splash-greeting { font-size: 22px; color: #2ecc71; margin: 16px 0 8px; }
        .splash-name { background: rgba(46,204,113,0.2); padding: 6px 20px; border-radius: 40px; }
        .splash-loader { width: 36px; height: 36px; border: 3px solid rgba(46,204,113,0.2); border-top-color: #2ecc71; border-radius: 50%; margin-top: 24px; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .pin-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #0a1f1a, #0c2a1f);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 3500;
        }
        .pin-box {
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(20px);
            border-radius: 56px;
            padding: 40px 32px;
            text-align: center;
            width: 320px;
            border: 1px solid rgba(46,204,113,0.3);
        }
        .pin-box h3 { font-size: 24px; color: #2ecc71; margin-bottom: 8px; }
        .pin-box p { font-size: 14px; color: rgba(255,255,255,0.6); margin-bottom: 24px; }
        .pin-dots { display: flex; justify-content: center; gap: 20px; margin: 32px 0; }
        .pin-dot { width: 18px; height: 18px; border-radius: 50%; background: rgba(255,255,255,0.2); }
        .pin-dot.filled { background: #2ecc71; box-shadow: 0 0 10px #2ecc71; transform: scale(1.1); }
        .pin-keys { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-top: 20px; }
        .pin-key { background: rgba(255,255,255,0.1); border: none; color: white; font-size: 28px; padding: 16px; border-radius: 60px; cursor: pointer; }
        .pin-key:active { background: #2ecc71; transform: scale(0.95); }
        .pin-clear { background: rgba(255,255,255,0.08); border: 1px solid rgba(255,71,87,0.3); color: #ff6b6b; margin-top: 20px; padding: 12px; border-radius: 40px; width: 100%; font-size: 16px; cursor: pointer; }

        .container { max-width: 600px; margin: 0 auto; padding: 16px; }
        .header {
            background: rgba(255,255,255,0.05);
            border-radius: 28px;
            padding: 12px 16px;
            margin-bottom: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo { font-size: 20px; font-weight: 800; background: linear-gradient(135deg, #2ecc71, #27ae60); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .currency { background: rgba(46,204,113,0.2); border: none; color: white; padding: 6px 12px; border-radius: 30px; }
        .search-input {
            width: 100%;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(46,204,113,0.3);
            border-radius: 40px;
            padding: 12px 16px;
            color: white;
            font-size: 14px;
            margin-bottom: 16px;
        }
        .sort { display: flex; gap: 10px; margin-bottom: 16px; }
        .sort-btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(46,204,113,0.3);
            padding: 6px 16px;
            border-radius: 30px;
            font-size: 12px;
            cursor: pointer;
            color: white;
        }
        .sort-btn.active { background: #2ecc71; }
        .total-card {
            background: rgba(46,204,113,0.1);
            border-radius: 28px;
            padding: 20px;
            margin-bottom: 20px;
            text-align: center;
            border: 1px solid rgba(46,204,113,0.3);
        }
        .total-amount { font-size: 42px; font-weight: 800; color: #2ecc71; margin: 10px 0; }
        .list { display: flex; flex-direction: column; gap: 10px; max-height: 45vh; overflow-y: auto; }
        .item {
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            padding: 14px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
        }
        .item-name { font-weight: 600; margin-bottom: 4px; }
        .debt-red { color: #ff6b6b; font-weight: 700; }
        .debt-green { color: #2ecc71; font-weight: 700; }
        .fab {
            position: fixed;
            bottom: 70px;
            right: 20px;
            width: 56px;
            height: 56px;
            background: linear-gradient(135deg, #2ecc71, #27ae60);
            border-radius: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 26px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(46,204,113,0.4);
            z-index: 100;
        }
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(10, 31, 26, 0.95);
            backdrop-filter: blur(15px);
            display: flex;
            justify-content: space-around;
            padding: 8px 20px 18px;
            border-top: 1px solid rgba(46,204,113,0.2);
            max-width: 600px;
            margin: 0 auto;
            z-index: 99;
        }
        .nav-item { text-align: center; font-size: 11px; color: #9bb8ae; cursor: pointer; }
        .nav-item i { font-size: 22px; display: block; margin-bottom: 4px; }
        .nav-item.active { color: #2ecc71; }

        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(12px);
            display: flex;
            align-items: flex-end;
            justify-content: center;
            z-index: 1000;
            visibility: hidden;
            opacity: 0;
            transition: 0.2s;
        }
        .modal.active { visibility: visible; opacity: 1; }
        .modal-content {
            background: #1a2f28;
            width: 100%;
            max-width: 500px;
            border-radius: 28px 28px 0 0;
            padding: 24px;
            max-height: 85vh;
            overflow-y: auto;
        }
        .type-buttons { display: flex; gap: 10px; margin-bottom: 20px; }
        .type-btn {
            flex: 1;
            padding: 10px;
            border-radius: 40px;
            background: rgba(255,255,255,0.1);
            text-align: center;
            cursor: pointer;
            font-size: 13px;
        }
        .type-btn.selected { background: #2ecc71; color: white; }
        .modal-content input, .modal-content textarea {
            width: 100%;
            padding: 12px;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(46,204,113,0.3);
            border-radius: 40px;
            margin-bottom: 12px;
            color: white;
            font-size: 16px;
        }
        .attach-btn {
            background: rgba(46,204,113,0.2);
            border: 1px dashed #2ecc71;
            padding: 10px;
            border-radius: 40px;
            text-align: center;
            cursor: pointer;
            margin-bottom: 12px;
        }
        .photo-preview { margin: 10px 0; text-align: center; }
        .photo-preview img { max-width: 100%; max-height: 100px; border-radius: 12px; }
        .modal-buttons { display: flex; gap: 12px; margin-top: 20px; }
        .modal-buttons button { flex: 1; padding: 12px; border-radius: 40px; border: none; font-weight: 600; cursor: pointer; }
        .btn-green { background: #2ecc71; color: white; }
        .btn-gray { background: rgba(255,255,255,0.1); color: white; }
        .btn-red { background: rgba(255,71,87,0.2); color: #ff6b6b; }

        .panel {
            background: rgba(255,255,255,0.05);
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 16px;
        }
        .stats { display: flex; gap: 12px; margin: 16px 0; }
        .stat-card { background: rgba(46,204,113,0.1); border-radius: 20px; padding: 12px; flex: 1; text-align: center; }
        .history-item, .expense-item {
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 12px;
            margin-bottom: 8px;
        }
        .expense-item { display: flex; justify-content: space-between; align-items: center; }
        .history-photo { max-width: 100px; max-height: 100px; border-radius: 12px; margin-top: 8px; }
        canvas { background: rgba(0,0,0,0.2); border-radius: 20px; padding: 8px; margin: 12px 0; width: 100%; height: auto; }
        .tab { display: none; }
        .tab.active { display: block; }
        .btn { padding: 12px; border-radius: 40px; width: 100%; margin-bottom: 10px; cursor: pointer; border: none; font-weight: 600; }
        .profile-avatar { font-size: 48px; text-align: center; margin-bottom: 16px; color: #2ecc71; }
    </style>
</head>
<body>

<div id="splash" class="splash">
    <div class="splash-logo">SIDCORP</div>
    <div class="splash-greeting" id="splashGreeting"></div>
    <div class="splash-name" id="splashName"></div>
    <div class="splash-loader"></div>
</div>

<div id="pinScreen" class="pin-screen" style="display: none;">
    <div class="pin-box">
        <h3><i class="fas fa-lock"></i> Введите PIN</h3>
        <p>Защита ваших данных</p>
        <div class="pin-dots" id="pinDots">
            <div class="pin-dot"></div><div class="pin-dot"></div><div class="pin-dot"></div><div class="pin-dot"></div>
        </div>
        <div class="pin-keys" id="pinKeys"></div>
        <button class="pin-clear" id="pinClearBtn"><i class="fas fa-eraser"></i> Очистить</button>
    </div>
</div>

<div id="app" style="display: none;">
    <div id="mainTab" class="tab active">
        <div class="container">
            <div class="header">
                <div class="logo">SIDCORP</div>
                <select id="currencySelect" class="currency">
                    <option value="₽">₽ RUB</option>
                    <option value="$">$ USD</option>
                    <option value="€">€ EUR</option>
                    <option value="₸">₸ KZT</option>
                    <option value="ЅМ">ЅМ TJS</option>
                </select>
            </div>
            <input type="text" id="searchInput" class="search-input" placeholder="🔍 Поиск по имени...">
            <div class="sort">
                <button class="sort-btn active" data-sort="debt">💰 По долгу</button>
                <button class="sort-btn" data-sort="name">📝 По имени</button>
            </div>
            <div class="total-card">
                <div>ОБЩИЙ ДОЛГ</div>
                <div class="total-amount" id="totalDebt">0 ₽</div>
                <div>Мне должны: <span id="totalOwed">0 ₽</span></div>
            </div>
            <div id="supplierList" class="list"></div>
        </div>
    </div>

    <div id="expensesTab" class="tab">
        <div class="container">
            <div class="panel">
                <h2><i class="fas fa-receipt"></i> Расходы</h2>
                <div class="stats">
                    <div class="stat-card"><div><strong id="todayExp">0</strong></div><small>сегодня</small></div>
                    <div class="stat-card"><div><strong id="monthExp">0</strong></div><small>месяц</small></div>
                </div>
                <canvas id="expChart" width="300" height="150"></canvas>
                <button id="openExpenseBtn" class="btn btn-green"><i class="fas fa-plus"></i> Добавить расход</button>
                <div id="expensesList"></div>
            </div>
        </div>
    </div>

    <div id="analyticsTab" class="tab">
        <div class="container">
            <div class="panel">
                <h2><i class="fas fa-chart-line"></i> Аналитика</h2>
                <div class="stats">
                    <div class="stat-card"><div><strong id="analyticsDebt">0</strong></div><small>мой долг</small></div>
                    <div class="stat-card"><div><strong id="analyticsOwed">0</strong></div><small>должны мне</small></div>
                </div>
                <h3>Мои долги</h3>
                <div id="myDebtsList"></div>
                <h3>Мне должны</h3>
                <div id="owedList"></div>
                <canvas id="debtChart" width="300" height="180"></canvas>
            </div>
        </div>
    </div>

    <div id="profileTab" class="tab">
        <div class="container">
            <div class="panel">
                <div class="profile-avatar"><i class="fas fa-user-circle"></i></div>
                <div class="stat-card"><strong id="profileName"></strong></div>
                <button id="changeNameBtn" class="btn btn-gray"><i class="fas fa-edit"></i> Сменить имя</button>
                <button id="changePinBtn" class="btn btn-gray"><i class="fas fa-lock"></i> Изменить PIN</button>
                <button id="exportJsonBtn" class="btn btn-green"><i class="fas fa-download"></i> Экспорт JSON</button>
                <button id="exportCsvBtn" class="btn btn-green"><i class="fas fa-file-excel"></i> Экспорт CSV</button>
                <input type="file" id="importFile" style="display:none">
                <button id="importBtn" class="btn btn-gray"><i class="fas fa-upload"></i> Восстановить</button>
                <button id="resetBtn" class="btn btn-red"><i class="fas fa-trash-alt"></i> Сбросить всё</button>
            </div>
        </div>
    </div>

    <div class="fab" id="fabBtn"><i class="fas fa-plus"></i></div>

    <div class="bottom-nav">
        <div class="nav-item active" data-tab="main"><i class="fas fa-home"></i><span>Главная</span></div>
        <div class="nav-item" data-tab="expenses"><i class="fas fa-receipt"></i><span>Расходы</span></div>
        <div class="nav-item" data-tab="analytics"><i class="fas fa-chart-pie"></i><span>Аналитика</span></div>
        <div class="nav-item" data-tab="profile"><i class="fas fa-user"></i><span>Профиль</span></div>
    </div>
</div>

<div id="addModal" class="modal">
    <div class="modal-content">
        <h3><i class="fas fa-plus-circle"></i> Добавить</h3>
        <div class="type-buttons">
            <div class="type-btn selected" data-type="debt_me"><i class="fas fa-hand-holding-usd"></i> Я взял</div>
            <div class="type-btn" data-type="debt_them"><i class="fas fa-hand-holding-heart"></i> Мне должны</div>
            <div class="type-btn" data-type="expense"><i class="fas fa-shopping-cart"></i> Расход</div>
        </div>
        <input type="text" id="modalName" placeholder="Название">
        <input type="number" id="modalAmount" placeholder="Сумма">
        <input type="date" id="modalDate">
        <textarea id="modalComment" placeholder="Комментарий" rows="2"></textarea>
        <div class="attach-btn" id="attachPhotoBtn"><i class="fas fa-camera"></i> Прикрепить фото</div>
        <input type="file" id="photoInput" accept="image/*" style="display:none">
        <div id="photoPreview" class="photo-preview"></div>
        <div class="modal-buttons">
            <button class="btn-gray" id="closeModalBtn">Отмена</button>
            <button class="btn-green" id="saveModalBtn">Сохранить</button>
        </div>
    </div>
</div>

<div id="detailModal" class="modal">
    <div class="modal-content" id="detailContent"></div>
</div>

<script>
    let suppliers = [];
    let transactions = [];
    let expenses = [];
    let currentCurrency = "₽";
    let currentSort = "debt";
    let searchText = "";
    let currentUser = "";
    let currentPin = localStorage.getItem("user_pin") || "";
    let pendingPin = "";
    let currentPhotoData = null;
    
    const rates = { "₽": 1, "$": 95, "€": 103, "₸": 0.19, "ЅМ": 10.5 };
    
    function formatMoney(amount) {
        let val = currentCurrency === "₽" ? amount : amount / rates[currentCurrency];
        return `${Math.round(val).toLocaleString()} ${currentCurrency}`;
    }
    
    function saveAll() {
        localStorage.setItem("sidcorp_suppliers", JSON.stringify(suppliers));
        localStorage.setItem("sidcorp_transactions", JSON.stringify(transactions));
        localStorage.setItem("sidcorp_expenses", JSON.stringify(expenses));
    }
    
    function loadAll() {
        suppliers = JSON.parse(localStorage.getItem("sidcorp_suppliers") || "[]");
        transactions = JSON.parse(localStorage.getItem("sidcorp_transactions") || "[]");
        expenses = JSON.parse(localStorage.getItem("sidcorp_expenses") || "[]");
        recalcBalances();
    }
    
    function recalcBalances() {
        suppliers.forEach(s => s.balance = 0);
        transactions.forEach(t => {
            let sup = suppliers.find(s => s.id === t.supplierId);
            if(sup) {
                if(t.type === "debt_me") sup.balance += t.amount;
                if(t.type === "debt_them") sup.balance -= t.amount;
            }
        });
        saveAll();
    }
    
    function getTotalDebt() { return suppliers.reduce((s, i) => i.balance > 0 ? s + i.balance : s, 0); }
    function getTotalOwed() { return suppliers.reduce((s, i) => i.balance < 0 ? s + Math.abs(i.balance) : s, 0); }
    
    function renderMain() {
        let list = [...suppliers];
        if(searchText) list = list.filter(s => s.name.toLowerCase().includes(searchText.toLowerCase()));
        if(currentSort === "debt") list.sort((a,b) => Math.abs(b.balance) - Math.abs(a.balance));
        else list.sort((a,b) => a.name.localeCompare(b.name));
        
        let container = document.getElementById("supplierList");
        if(!container) return;
        if(list.length === 0) {
            container.innerHTML = "<div style='text-align:center;padding:40px;'><i class='fas fa-box-open'></i><br>Нет данных<br><small>➕ Нажмите +</small></div>";
        } else {
            container.innerHTML = list.map(s => {
                let cls = s.balance > 0 ? "debt-red" : (s.balance < 0 ? "debt-green" : "");
                let sign = s.balance > 0 ? `+${formatMoney(s.balance)}` : formatMoney(s.balance);
                return `<div class="item" data-id="${s.id}"><div><div class="item-name"><strong>${escapeHtml(s.name)}</strong></div><div><small>${s.balance > 0 ? "Я должен" : (s.balance < 0 ? "Должен мне" : "Ноль")}</small></div></div><div class="${cls}">${sign}</div></div>`;
            }).join("");
        }
        document.getElementById("totalDebt").innerHTML = formatMoney(getTotalDebt());
        document.getElementById("totalOwed").innerHTML = formatMoney(getTotalOwed());
        document.querySelectorAll(".item").forEach(el => {
            el.onclick = () => showHistory(el.dataset.id);
            let timer;
            el.ontouchstart = () => { timer = setTimeout(() => { if(confirm("Удалить поставщика?")) deleteSupplier(el.dataset.id); }, 500); };
            el.ontouchend = () => clearTimeout(timer);
        });
    }
    
    function deleteSupplier(id) {
        suppliers = suppliers.filter(s => s.id !== id);
        transactions = transactions.filter(t => t.supplierId !== id);
        saveAll();
        recalcBalances();
        renderMain();
        renderAnalytics();
        showToast("🗑 Поставщик удалён");
    }
    
    function showHistory(supplierId) {
        let supplier = suppliers.find(s => s.id === supplierId);
        if(!supplier) return;
        let filtered = transactions.filter(t => t.supplierId === supplierId).reverse();
        let modal = document.getElementById("detailModal");
        let content = document.getElementById("detailContent");
        let html = `<h3>${escapeHtml(supplier.name)}</h3><p>Баланс: <strong style="color:#2ecc71">${formatMoney(supplier.balance)}</strong></p><button class="btn btn-green" onclick="partialPay('${supplierId}')">💰 Частичное погашение</button><h4 style="margin:16px 0 8px;">История</h4>`;
        if(filtered.length === 0) html += "<p>Нет операций</p>";
        else {
            filtered.forEach(t => {
                let photoHtml = t.photo ? `<div><img src="${t.photo}" class="history-photo"></div>` : '';
                html += `<div class="history-item"><div><i class="fas fa-calendar"></i> ${t.date}</div><div><strong>${t.type === "debt_me" ? `➕ Взял +${t.amount}` : `➖ Оплатил -${t.amount}`}</strong></div><div>${escapeHtml(t.comment) || ""}</div>${photoHtml}<div style="display:flex;gap:8px;margin-top:8px;"><button class="btn-gray" style="padding:4px 12px;font-size:12px;" onclick="editTrans('${t.id}')"><i class="fas fa-edit"></i></button><button class="btn-red" style="padding:4px 12px;font-size:12px;" onclick="delTrans('${t.id}')"><i class="fas fa-trash"></i></button></div></div>`;
            });
        }
        html += `<button class="btn btn-gray" onclick="closeModal()">Закрыть</button>`;
        content.innerHTML = html;
        modal.classList.add("active");
    }
    
    function addTransaction(name, amount, type, comment, date, photo) {
        if(!name || !amount) { showToast("Введите название и сумму"); return; }
        let supplier = suppliers.find(s => s.name === name);
        if(!supplier) {
            supplier = { id: Date.now().toString(), name: name, balance: 0 };
            suppliers.push(supplier);
        }
        transactions.push({ id: Date.now().toString(), supplierId: supplier.id, amount: amount, type: type, date: date || new Date().toISOString().slice(0,10), comment: comment || "", photo: photo || null });
        saveAll(); recalcBalances(); renderMain(); renderAnalytics(); showToast("✅ Добавлено");
    }
    
    function addExpense(amount, comment, date, photo) {
        if(!amount) { showToast("Введите сумму"); return; }
        expenses.push({ id: Date.now().toString(), amount: amount, comment: comment || "", date: date || new Date().toISOString().slice(0,10), photo: photo || null });
        saveAll(); renderExpenses(); showToast("💸 Расход добавлен");
    }
    
    function partialPay(supplierId) {
        let supplier = suppliers.find(s => s.id === supplierId);
        if(!supplier || supplier.balance <= 0) { showToast("Нет долга"); return; }
        let amount = prompt(`Сумма погашения (макс ${supplier.balance}):`);
        if(amount && !isNaN(parseFloat(amount)) && parseFloat(amount) > 0 && parseFloat(amount) <= supplier.balance) {
            addTransaction(supplier.name, parseFloat(amount), "debt_them", "Погашение", new Date().toISOString().slice(0,10), null);
        }
    }
    
    function editTrans(id) {
        let t = transactions.find(tx => tx.id === id);
        if(!t) return;
        let newAmount = prompt("Новая сумма:", t.amount);
        if(newAmount && !isNaN(parseFloat(newAmount))) { t.amount = parseFloat(newAmount); saveAll(); recalcBalances(); renderMain(); renderAnalytics(); closeModal(); showToast("✅ Изменено"); }
    }
    
    function delTrans(id) {
        if(confirm("Удалить транзакцию?")) { transactions = transactions.filter(t => t.id !== id); saveAll(); recalcBalances(); renderMain(); renderAnalytics(); closeModal(); showToast("🗑 Удалено"); }
    }
    
    function renderExpenses() {
        let today = new Date().toISOString().slice(0,10), now = new Date(), todayTotal = 0, monthTotal = 0;
        expenses.forEach(e => { if(e.date === today) todayTotal += e.amount; let d = new Date(e.date); if(d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear()) monthTotal += e.amount; });
        document.getElementById("todayExp").innerHTML = formatMoney(todayTotal);
        document.getElementById("monthExp").innerHTML = formatMoney(monthTotal);
        let container = document.getElementById("expensesList");
        if(expenses.length === 0) container.innerHTML = "<div style='text-align:center;padding:20px;'>Нет расходов</div>";
        else { container.innerHTML = [...expenses].reverse().map(e => `<div class="expense-item"><div><small>${e.date}</small><br>${escapeHtml(e.comment)}</div><strong>${formatMoney(e.amount)}</strong></div>`).join(""); }
        let last7 = [], last7vals = [];
        for(let i=6; i>=0; i--) { let d = new Date(); d.setDate(d.getDate() - i); let dateStr = d.toISOString().slice(0,10); last7.push(dateStr.slice(5)); let sum = expenses.filter(e => e.date === dateStr).reduce((s, e) => s + e.amount, 0); last7vals.push(sum); }
        let ctx = document.getElementById("expChart")?.getContext("2d");
        if(window.expChart) window.expChart.destroy();
        if(ctx) { window.expChart = new Chart(ctx, { type: 'line', data: { labels: last7, datasets: [{ label: 'Расходы', data: last7vals, borderColor: '#2ecc71', fill: true, backgroundColor: 'rgba(46,204,113,0.1)' }] }, options: { responsive: true, maintainAspectRatio: true } }); }
    }
    
    function renderAnalytics() {
        document.getElementById("analyticsDebt").innerHTML = formatMoney(getTotalDebt());
        document.getElementById("analyticsOwed").innerHTML = formatMoney(getTotalOwed());
        let myDebts = suppliers.filter(s => s.balance > 0).sort((a,b) => b.balance - a.balance);
        let owedToMe = suppliers.filter(s => s.balance < 0).sort((a,b) => a.balance - b.balance);
        document.getElementById("myDebtsList").innerHTML = myDebts.length ? myDebts.map(s => `<div class="history-item"><span>${escapeHtml(s.name)}</span><span class="debt-red">${formatMoney(s.balance)}</span></div>`).join("") : "<div style='text-align:center; padding:16px;'>Нет долгов</div>";
        document.getElementById("owedList").innerHTML = owedToMe.length ? owedToMe.map(s => `<div class="history-item"><span>${escapeHtml(s.name)}</span><span class="debt-green">${formatMoney(Math.abs(s.balance))}</span></div>`).join("") : "<div style='text-align:center; padding:16px;'>Никто не должен</div>";
        let ctx = document.getElementById("debtChart")?.getContext("2d");
        if(window.debtChart) window.debtChart.destroy();
        if(ctx && suppliers.length) { let top5 = suppliers.slice(0,5).map(s => ({ name: s.name.slice(0,10), balance: s.balance })); window.debtChart = new Chart(ctx, { type: 'bar', data: { labels: top5.map(s => s.name), datasets: [{ label: 'Баланс', data: top5.map(s => s.balance), backgroundColor: '#2ecc71', borderRadius: 10 }] }, options: { responsive: true, maintainAspectRatio: true } }); }
    }
    
    function exportJSON() { let data = { suppliers, transactions, expenses }; let blob = new Blob([JSON.stringify(data, null, 2)], {type: "application/json"}); let link = document.createElement("a"); link.href = URL.createObjectURL(blob); link.download = `sidcorp_${new Date().toISOString().slice(0,10)}.json`; link.click(); showToast("✅ Экспорт JSON"); }
    function exportCSV() { let rows = [["Тип","Контрагент","Сумма","Дата","Коммент"]]; transactions.forEach(t => { let sup = suppliers.find(s => s.id === t.supplierId); rows.push([t.type === "debt_me" ? "Долг" : "Оплата", sup?.name, t.amount, t.date, t.comment]); }); expenses.forEach(e => rows.push(["Расход", e.comment, e.amount, e.date, ""])); let csv = rows.map(r => r.join(",")).join("\n"); let blob = new Blob(["\uFEFF" + csv], {type: "text/csv"}); let link = document.createElement("a"); link.href = URL.createObjectURL(blob); link.download = `sidcorp_export.csv`; link.click(); showToast("✅ CSV экспорт"); }
    function importJSON(file) { let reader = new FileReader(); reader.onload = function(e) { try { let data = JSON.parse(e.target.result); if(data.suppliers) suppliers = data.suppliers; if(data.transactions) transactions = data.transactions; if(data.expenses) expenses = data.expenses; saveAll(); recalcBalances(); renderMain(); renderAnalytics(); renderExpenses(); showToast("✅ Восстановлено"); } catch(err) { showToast("Ошибка файла"); } }; reader.readAsText(file); }
    function showToast(msg) { let t = document.createElement("div"); t.textContent = msg; t.style.cssText = "position:fixed;bottom:120px;left:50%;transform:translateX(-50%);background:#000;color:white;padding:8px 20px;border-radius:40px;z-index:9999;font-size:14px;"; document.body.appendChild(t); setTimeout(() => t.remove(), 2000); }
    function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'})[m]); }
    function closeModal() { document.querySelectorAll(".modal").forEach(m => m.classList.remove("active")); }
    
    function setupPin() {
        if(!currentPin) {
            let newPin = prompt("🔒 Установите PIN-код (4 цифры):");
            if(newPin && /^\d{4}$/.test(newPin)) { currentPin = newPin; localStorage.setItem("user_pin", currentPin); showToast("🔒 PIN установлен"); showApp(); }
            else if(newPin !== null) setupPin();
            else showApp();
        } else { showPinScreen(); }
    }
    function showPinScreen() {
        document.getElementById("pinScreen").style.display = "flex";
        pendingPin = "";
        updatePinDots();
        let keysDiv = document.getElementById("pinKeys");
        keysDiv.innerHTML = "";
        for(let i=1; i<=9; i++) { let btn = document.createElement("button"); btn.textContent = i; btn.className = "pin-key"; btn.onclick = (function(num) { return function() { if(pendingPin.length < 4) { pendingPin += num; updatePinDots(); if(pendingPin.length === 4) checkPin(); } }; })(i); keysDiv.appendChild(btn); }
        let btn0 = document.createElement("button"); btn0.textContent = "0"; btn0.className = "pin-key"; btn0.onclick = function() { if(pendingPin.length < 4) { pendingPin += "0"; updatePinDots(); if(pendingPin.length === 4) checkPin(); } }; keysDiv.appendChild(btn0);
        document.getElementById("pinClearBtn").onclick = function() { pendingPin = ""; updatePinDots(); };
    }
    function updatePinDots() { let dots = document.querySelectorAll(".pin-dot"); for(let i=0; i<dots.length; i++) { if(i < pendingPin.length) dots[i].classList.add("filled"); else dots[i].classList.remove("filled"); } }
    function checkPin() { if(pendingPin === currentPin) { document.getElementById("pinScreen").style.display = "none"; showApp(); showToast("🔓 Добро пожаловать!"); } else { showToast("❌ Неверный PIN"); pendingPin = ""; updatePinDots(); } }
    function showApp() {
        document.getElementById("app").style.display = "block";
        loadAll(); renderMain(); renderAnalytics(); renderExpenses();
        let storedName = localStorage.getItem("username");
        if(storedName) { currentUser = storedName; document.getElementById("profileName").innerHTML = "<i class='fas fa-user'></i> " + currentUser; }
        else { let name = prompt("👋 Как вас зовут?", "Друг"); if(name) { currentUser = name; localStorage.setItem("username", currentUser); document.getElementById("profileName").innerHTML = "<i class='fas fa-user'></i> " + currentUser; } }
    }
    function switchTab(tab) {
        document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
        document.getElementById(tab + "Tab").classList.add("active");
        document.querySelectorAll(".nav-item").forEach(n => n.classList.remove("active"));
        document.querySelector(`.nav-item[data-tab="${tab}"]`).classList.add("active");
        if(tab === "analytics") renderAnalytics();
        if(tab === "expenses") renderExpenses();
    }
    
    document.addEventListener("DOMContentLoaded", function() {
        let hour = new Date().getHours();
        let greeting = hour < 12 ? "Доброе утро" : (hour < 18 ? "Добрый день" : "Добрый вечер");
        document.getElementById("splashGreeting").innerHTML = greeting;
        let storedName = localStorage.getItem("username");
        document.getElementById("splashName").innerHTML = storedName || "Гость";
        setTimeout(function() { document.getElementById("splash").style.opacity = "0"; setTimeout(function() { document.getElementById("splash").style.display = "none"; setupPin(); }, 500); }, 2000);
        
        document.getElementById("currencySelect").addEventListener("change", function(e) { currentCurrency = e.target.value; renderMain(); renderAnalytics(); renderExpenses(); });
        document.querySelectorAll(".sort-btn").forEach(btn => { btn.onclick = function() { currentSort = this.getAttribute("data-sort"); document.querySelectorAll(".sort-btn").forEach(b => b.classList.remove("active")); this.classList.add("active"); renderMain(); }; });
        document.getElementById("searchInput").addEventListener("input", function(e) { searchText = e.target.value; renderMain(); });
        document.getElementById("fabBtn").addEventListener("click", function() { document.getElementById("modalName").value = ""; document.getElementById("modalAmount").value = ""; document.getElementById("modalDate").value = new Date().toISOString().slice(0,10); document.getElementById("modalComment").value = ""; currentPhotoData = null; document.getElementById("photoPreview").innerHTML = ""; document.querySelectorAll(".type-btn").forEach(btn => btn.classList.remove("selected")); document.querySelector(".type-btn[data-type='debt_me']").classList.add("selected"); document.getElementById("modalName").placeholder = "Название поставщика"; document.getElementById("addModal").classList.add("active"); });
        document.getElementById("openExpenseBtn").addEventListener("click", function() { document.getElementById("modalName").value = ""; document.getElementById("modalAmount").value = ""; document.getElementById("modalDate").value = new Date().toISOString().slice(0,10); document.getElementById("modalComment").value = ""; currentPhotoData = null; document.getElementById("photoPreview").innerHTML = ""; document.querySelectorAll(".type-btn").forEach(btn => btn.classList.remove("selected")); document.querySelector(".type-btn[data-type='expense']").classList.add("selected"); document.getElementById("modalName").placeholder = "На что потратил?"; document.getElementById("addModal").classList.add("active"); });
        document.getElementById("attachPhotoBtn").addEventListener("click", () => document.getElementById("photoInput").click());
        document.getElementById("photoInput").addEventListener("change", (e) => { let file = e.target.files[0]; if(file) { let reader = new FileReader(); reader.onload = (ev) => { currentPhotoData = ev.target.result; document.getElementById("photoPreview").innerHTML = `<img src="${currentPhotoData}" style="max-width:100%; max-height:100px; border-radius:12px;">`; }; reader.readAsDataURL(file); } });
        document.getElementById("saveModalBtn").addEventListener("click", function() { let name = document.getElementById("modalName").value; let amount = parseFloat(document.getElementById("modalAmount").value); let date = document.getElementById("modalDate").value; let comment = document.getElementById("modalComment").value; let selectedType = document.querySelector(".type-btn.selected")?.getAttribute("data-type"); if(!amount || amount <= 0) { showToast("Введите сумму"); return; } if(selectedType === "expense") { addExpense(amount, name || "Расход", date, currentPhotoData); } else { if(!name) { showToast("Введите название"); return; } addTransaction(name, amount, selectedType, comment, date, currentPhotoData); } closeModal(); });
        document.getElementById("closeModalBtn").addEventListener("click", closeModal);
        document.querySelectorAll(".type-btn").forEach(btn => { btn.onclick = function() { document.querySelectorAll(".type-btn").forEach(b => b.classList.remove("selected")); this.classList.add("selected"); document.getElementById("modalName").placeholder = this.getAttribute("data-type") === "expense" ? "На что потратил?" : "Название поставщика"; }; });
        document.querySelectorAll(".nav-item").forEach(item => { item.onclick = function() { switchTab(this.getAttribute("data-tab")); }; });
        document.getElementById("exportJsonBtn").addEventListener("click", exportJSON);
        document.getElementById("exportCsvBtn").addEventListener("click", exportCSV);
        document.getElementById("importBtn").addEventListener("click", () => document.getElementById("importFile").click());
        document.getElementById("importFile").addEventListener("change", e => { if(e.target.files[0]) importJSON(e.target.files[0]); });
        document.getElementById("resetBtn").addEventListener("click", () => { if(confirm("Сбросить всё?")) { localStorage.clear(); location.reload(); } });
        document.getElementById("changeNameBtn").addEventListener("click", () => { let newName = prompt("Новое имя:", currentUser); if(newName) { currentUser = newName; localStorage.setItem("username", currentUser); document.getElementById("profileName").innerHTML = "<i class='fas fa-user'></i> " + currentUser; showToast("✅ Имя изменено"); } });
        document.getElementById("changePinBtn").addEventListener("click", () => { let newPin = prompt("Новый PIN (4 цифры):"); if(newPin && /^\d{4}$/.test(newPin)) { currentPin = newPin; localStorage.setItem("user_pin", currentPin); showToast("🔒 PIN изменен"); } else if(newPin) showToast("PIN должен быть 4 цифры"); });
    });
    
    window.partialPay = partialPay;
    window.editTrans = editTrans;
    window.delTrans = delTrans;
    window.closeModal = closeModal;
</script>
</body>
</html>
